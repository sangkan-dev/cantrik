# Optional SWE-bench / Terminal-Bench harness hook. Does not gate the main Rust CI job.
name: benchmark harness

on:
  workflow_dispatch:

jobs:
  harness-placeholder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SWE-bench checkout
        uses: actions/cache@v4
        with:
          path: .bench/SWE-bench
          key: swe-bench-${{ runner.os }}-v1-${{ hashFiles('.github/workflows/benchmark-harness.yml') }}
          restore-keys: |
            swe-bench-${{ runner.os }}-v1-

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc + bubblewrap + ripgrep
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler bubblewrap ripgrep

      - uses: Swatinem/rust-cache@v2

      - name: Shallow clone SWE-bench (read-only slice, skip if cache hit)
        run: |
          mkdir -p .bench
          if [[ ! -f .bench/SWE-bench/README.md ]]; then
            git clone --depth 1 https://github.com/princeton-nlp/SWE-bench.git .bench/SWE-bench
          fi
          test -f .bench/SWE-bench/README.md

      - name: Mini dataset directory (placeholder)
        run: |
          mkdir -p .bench/minimal
          echo "# Bench placeholder — Terminal-Bench / custom slices can live alongside SWE-bench." > .bench/minimal/README.md
          test -f .bench/minimal/README.md

      - name: Bench policy (repo docs)
        run: test -f .bench/README.md && sed -n '1,12p' .bench/README.md

      - name: Stub runner (non-LLM cantrik tests)
        run: bash scripts/benchmark-harness-stub.sh

      - name: Document local baseline
        run: |
          echo "Local baseline: ./scripts/phase5-smoke.sh"
          echo "Optional env when wiring an external runner: CANTRIK_BENCH_HARNESS=1"

      - name: Success
        run: |
          echo "benchmark-harness: clone + stub OK (exit 0)"
