name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (LanceDB compilation is large)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force 2>/dev/null || true
          df -h

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc (LanceDB / lance-encoding build)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install bubblewrap + ripgrep (Sprint 8 tool / sandbox tests)
        run: sudo apt-get install -y bubblewrap ripgrep

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test (lib + unit tests)
        run: cargo test --workspace --lib

  packaging-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Winget manifest parses as YAML
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-yaml
          python3 -c "import yaml; yaml.safe_load(open('packaging/winget/Sangkan.Cantrik.yaml'))"

      - name: PKGBUILD references cantrik-cli package
        run: grep -q 'cantrik-cli' packaging/arch/PKGBUILD

      - name: Recipes registry JSON schema (minimal)
        run: python3 scripts/validate-recipes-registry.py apps/cantrik-site/static/registry/recipes.json
