name: Release binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: cantrik
            asset_name: cantrik-linux-x86_64
          # Native ARM runner (no `cross` / QEMU): avoids GLIBC + build-script arch mixups from emulated builds.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: cantrik
            asset_name: cantrik-linux-aarch64
          # macos-13 removed from GitHub; x86_64 Apple target builds from macos-latest via Rust cross-target.
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: cantrik
            asset_name: cantrik-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: cantrik
            asset_name: cantrik-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: Swatinem/rust-cache@v2
        with:
          # One cache per target — prevents x86_64 host artifacts polluting aarch64 (and vice versa).
          shared-key: release-${{ matrix.target }}

      - name: Build release
        run: cargo build --release -p cantrik-cli --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
