name: Release binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: cantrik
            asset_name: cantrik-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: cantrik
            asset_name: cantrik-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: cantrik
            asset_name: cantrik-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: cantrik
            asset_name: cantrik-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross (Linux aarch64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2

      - name: Build release (native)
        if: matrix.cross != true
        run: cargo build --release -p cantrik-cli --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.cross == true
        run: cross build --release -p cantrik-cli --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
