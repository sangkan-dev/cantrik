name: Cantrik site

on:
  push:
    branches: ["main", "master"]
    paths:
      - "apps/cantrik-site/**"
      - "scripts/validate-extensions-registry.py"
      - ".github/workflows/cantrik-site.yml"
  pull_request:
    paths:
      - "apps/cantrik-site/**"
      - "scripts/validate-extensions-registry.py"
      - ".github/workflows/cantrik-site.yml"

jobs:
  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cantrik-site
    steps:
      - uses: actions/checkout@v4
      - name: Validate extensions registry JSON
        run: python3 scripts/validate-extensions-registry.py apps/cantrik-site/static/registry/extensions.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/cantrik-site/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run build
